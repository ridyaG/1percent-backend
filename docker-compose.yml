services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: onepercent_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 141815
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  